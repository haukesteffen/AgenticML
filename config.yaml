dataset:
  train_path: data/train.csv
  test_path: data/test.csv
  target: PitNextLap
  id_column: id
  problem_type: binary_classification   # | multiclass_classification | regression

metric:
  name: roc_auc                   # | roc_auc | balanced_accuracy | accuracy | logloss | rmse | mae

cv:
  n_splits: 5
  shuffle: true
  seed: 42

budget:
  smoke_seconds: 60
  fold_seconds: 600

smoke:
  data_fraction: 0.05
  n_splits: 2

mlflow:
  experiment_prefix: agenticml
  competition_slug: predicting-f1-pit-stops   # mlflow experiment-name suffix; stable across history
  kaggle_competition: playground-series-s6e5  # real Kaggle competition slug for API uploads
