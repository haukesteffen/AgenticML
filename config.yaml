dataset:
  train_path: data/train.csv
  target: Irrigation_Need
  id_column: id
  problem_type: multiclass_classification   # | binary_classification | regression

metric:
  name: balanced_accuracy                   # | roc_auc | accuracy | logloss | rmse | mae

cv:
  n_splits: 5
  shuffle: true
  seed: 42

budget:
  smoke_seconds: 300
  fold_seconds: 1800

smoke:
  data_fraction: 0.05
  n_splits: 2

mlflow:
  experiment_prefix: agenticml
  competition_slug: playground-s6e4
